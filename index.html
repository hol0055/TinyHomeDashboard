<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiny Home Dashboard</title>
  <style>
    .flex-container {
    display: flex;
    flex-wrap: wrap; /* Elements drop to the next line on smaller screens */
    }

  /* Responsive image background */

    html, body { height: 100%; margin: 0; }
    .hero-img {
      position: fixed;
      top: 0; left: 0;
      height: 100vh;   /* fill height */
      width: 100vw;    /* fill width too */
      object-fit: fill; /* stretch */
      z-index: -1;
    }
  </style>
  <body>
    <img class="hero-img" src="https://down-yuantu.pngtree.com/back_our/bg/20201005/bg/16516434e6d82_405384.jpg?e=1781862927&st=ZDUyOTBhNTMxZjFkMjFhNWU5N2FhZjNjMDcwZWRjOWM&n=%E2%80%94Pngtree%E2%80%94dark+green+cyan+paper+cut_1225583.jpg">
  </body>
</html>
